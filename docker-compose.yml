
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: snapruletka
      POSTGRES_PASSWORD: snapruletka
      POSTGRES_DB: snapruletka
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6380"

  minio:
    image: minio/minio
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9003:9000"
      - "9002:9002"
    volumes:
      - minio_data:/data


  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/snapruletka;
      /usr/bin/mc anonymous set download myminio/snapruletka;
      exit 0;
      "

volumes:
  pgdata:
  minio_data: