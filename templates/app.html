<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Ruletka - Приложение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto 30px;
            color: white;
        }

        .header h1 {
            font-size: 1.8em;
        }

        .user-info {
            text-align: right;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .photo-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .photo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .photo-placeholder {
            color: #999;
            font-size: 1.2em;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .like-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .skip-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .report-btn {
            background: #e0e0e0;
            color: #666;
            padding: 10px 20px;
            font-size: 14px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .upload-section {
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
            margin-top: 20px;
        }

        .upload-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .file-input-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            padding: 40px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        .balance {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance span {
            font-size: 2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 Snap Ruletka</h1>
        <div class="user-info">
            <div id="user-email"></div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="main-container">
        <div id="error-message" class="error-message"></div>

        <div class="balance">
            <div>Ваш баланс</div>
            <span id="view-balance">0</span> просмотров
        </div>

        <div class="photo-container" id="photo-container">
            <div class="loading">Загрузка фото...</div>
        </div>

        <div class="actions">
            <button class="action-btn skip-btn" onclick="loadNewPhoto()">Пропустить</button>
            <button class="action-btn like-btn" onclick="likePhoto()">❤️ Лайк</button>
        </div>

        <div style="text-align: center;">
            <button class="action-btn report-btn" onclick="reportPhoto()">Пожаловаться</button>
        </div>

        <div class="upload-section">
            <h3>Загрузить своё фото</h3>
            <div class="file-input-wrapper">
                <button class="file-input-btn">📷 Выбрать фото</button>
                <input type="file" id="photo-upload" accept="image/*" onchange="uploadPhoto(this)">
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        let currentPhotoId = null;
        let currentUser = null;

        // Проверка авторизации
        if (!token) {
            window.location.href = '/';
        } else {
            loadUserInfo();
            loadNewPhoto();
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('user-email').textContent = currentUser.email;
                    document.getElementById('view-balance').textContent = currentUser.view_balance;
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Failed to load user info:', error);
            }
        }

        async function loadNewPhoto() {
            const container = document.getElementById('photo-container');
            container.innerHTML = '<div class="loading">Загрузка фото...</div>';

            try {
                const response = await fetch(`${API_URL}/photos/random`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const photo = await response.json();
                    currentPhotoId = photo.id;
                    container.innerHTML = `<img src="${photo.url}" alt="Photo" onerror="this.src='${photo.thumbnail_url}'">`;
                } else {
                    container.innerHTML = '<div class="photo-placeholder">Нет доступных фото<br>Загрузите своё!</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="photo-placeholder">Ошибка загрузки фото</div>';
                console.error('Failed to load photo:', error);
            }
        }

        async function likePhoto() {
            if (!currentPhotoId) return;

            try {
                const response = await fetch(`${API_URL}/photos/${currentPhotoId}/like`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.liked) {
                        // Обновляем баланс
                        loadUserInfo();
                    }
                    loadNewPhoto();
                } else {
                    showError('Не удалось поставить лайк');
                }
            } catch (error) {
                showError('Ошибка соединения');
                console.error('Like error:', error);
            }
        }

        async function reportPhoto() {
            if (!currentPhotoId) return;

            const reason = prompt('Причина жалобы (необязательно):');

            try {
                const url = new URL(`${API_URL}/photos/${currentPhotoId}/report`);
                if (reason) {
                    url.searchParams.append('reason', reason);
                }

                const response = await fetch(url.toString(), {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    alert('Жалоба отправлена');
                    loadNewPhoto();
                } else {
                    showError('Не удалось отправить жалобу');
                }
            } catch (error) {
                showError('Ошибка соединения');
                console.error('Report error:', error);
            }
        }

        async function uploadPhoto(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_URL}/photos/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                if (response.ok) {
                    alert('Фото загружено!');
                    loadNewPhoto();
                    input.value = '';
                } else {
                    const data = await response.json();
                    showError(data.detail || 'Ошибка загрузки');
                }
            } catch (error) {
                showError('Ошибка соединения');
                console.error('Upload error:', error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            window.location.href = '/';
        }
    </script>
</body>
</html>
